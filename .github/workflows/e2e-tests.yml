name: E2E Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start Docker Compose (CI)
        run: docker compose -f docker-compose.ci.yaml --env-file .env.example up -d --build

      - name: Wait for services to be ready
        run: |
          echo "Waiting for backend to be fully ready..."
          timeout=180
          until curl -s -f http://localhost:8000/docs > /dev/null || [ $timeout -eq 0 ]; do
            sleep 3
            timeout=$((timeout-3))
          done

          if [ $timeout -eq 0 ]; then
            echo "❌ Backend did not start in time"
            docker compose -f docker-compose.ci.yaml logs backend
            exit 1
          fi

          echo "Waiting for frontend..."
          timeout=120
          until curl -s -f http://localhost:3000 > /dev/null || [ $timeout -eq 0 ]; do
            sleep 3
            timeout=$((timeout-3))
          done

          echo "✅ Both services are ready!"
          sleep 5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/tests/requirements.txt

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements.txt

      - name: Setup ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Run E2E Tests
        working-directory: ./backend
        env:
          E2E_TARGET: "ci"
        run: |
          mkdir -p junit
          export DISPLAY=:99
          Xvfb :99 -screen 0 1280x1024x24 > /dev/null 2>&1 &
          chromedriver --url-base=/wd/hub &
          sleep 3
          
          pytest tests/e2e/test_system_e2e.py -v --junitxml=junit/e2e-results.xml

      - name: Publish Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: E2E Tests Report
          path: backend/junit/e2e-results.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-reports
          path: backend/junit/
          retention-days: 7

      - name: Stop Docker Compose
        if: always()
        run: docker compose -f docker-compose.ci.yaml down -v --remove-orphans