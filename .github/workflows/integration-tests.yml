name: Integration Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: read
      checks: write

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check integration tests presence
        id: check-tests
        run: |
          if find tests/integration -type f -name 'test_*.py' | grep -q .; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/tests/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r tests/requirements.txt

      - name: Run integration tests
        id: tests
        if: steps.check-tests.outputs.has_tests == 'true'
        run: |
          mkdir -p test-reports
          pytest tests/integration -v \
            --junitxml=test-reports/junit-integration.xml

      - name: Publish test report
        uses: dorny/test-reporter@v1
        if: always() && steps.check-tests.outputs.has_tests == 'true'
        with:
          name: Integration Tests Report
          path: backend/test-reports/junit-integration.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always() && steps.check-tests.outputs.has_tests == 'true'
        with:
          name: integration-test-reports
          path: backend/test-reports/
          retention-days: 7

      - name: Skip notice when tests are absent
        if: steps.check-tests.outputs.has_tests == 'false'
        run: echo "No integration tests found in tests/integration. CI run is skipped."